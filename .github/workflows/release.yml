name: Build e Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────
  # GERAR JAR
  # ─────────────────────────────────────────────
  build-jar:
    name: Gerar JAR
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Dar permissao ao Gradle
        working-directory: controle-horas
        run: chmod +x gradlew

      - name: Gerar JAR
        working-directory: controle-horas
        run: ./gradlew bootJar

      - name: Verificar arquivos
        working-directory: controle-horas
        run: ls -lh build/libs/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/*.jar

  # ─────────────────────────────────────────────
  # GERAR EXE
  # ─────────────────────────────────────────────
  build-exe:
    name: Gerar EXE
    runs-on: windows-latest
    needs: build-jar

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download do JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/

      - name: Verificar JAR
        working-directory: controle-horas
        shell: cmd
        run: dir build\libs

      - name: Gerar EXE
        working-directory: controle-horas
        shell: cmd
        run: gradlew.bat createExe

      - name: Verificar EXE
        working-directory: controle-horas
        shell: cmd
        run: dir build\dist

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe-file
          path: controle-horas/build/dist/*.exe

  # ─────────────────────────────────────────────
  # PUBLICAR RELEASE
  # ─────────────────────────────────────────────
  release:
    name: Publicar Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-exe]

    permissions:
      contents: write

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: dist/

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe-file
          path: dist/

      - name: Copiar scripts Linux
        run: |
          cp controle-horas/scripts/instalar-linux.sh dist/
          cp controle-horas/scripts/desinstalar-linux.sh dist/
          chmod +x dist/instalar-linux.sh
          chmod +x dist/desinstalar-linux.sh

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.jar
            dist/*.exe
            dist/instalar-linux.sh
            dist/desinstalar-linux.sh