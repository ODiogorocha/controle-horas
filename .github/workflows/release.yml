name: Build e Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-jar:
    name: Gerar JAR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Permissao Gradle
        working-directory: controle-horas
        run: chmod +x gradlew

      - name: Build do projeto
        working-directory: controle-horas
        run: ./gradlew clean bootJar

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/controle-horas.jar

  build-exe:
    name: Gerar EXE Windows
    runs-on: windows-latest
    needs: build-jar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download do JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/

      - name: Criar pasta installer
        shell: cmd
        run: mkdir controle-horas\build\installer

      - name: Gerar EXE
        shell: cmd
        run: |
          jpackage ^
          --input controle-horas\build\libs ^
          --main-jar controle-horas.jar ^
          --main-class com.empresa.controle_horas.ControleHorasApplication ^
          --name "Controle de Horas" ^
          --type exe ^
          --dest controle-horas\build\installer ^
          --app-version "1.5.4" ^
          --vendor "ODiogorocha" ^
          --icon controle-horas\scripts\controle-horas.ico ^
          --win-dir-chooser ^
          --win-menu ^
          --win-shortcut

      - name: Renomear instalador
        shell: powershell
        run: |
          $exe = Get-ChildItem "controle-horas\build\installer\*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "controle-horas\build\installer\ControleDeHoras-Installer.exe"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe-installer
          path: controle-horas/build/installer/ControleDeHoras-Installer.exe

  release:
    name: Publicar Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-exe]

    permissions:
      contents: write

    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: dist/

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe-installer
          path: dist/

      - name: Copiar scripts Linux
        run: |
          cp controle-horas/scripts/instalar-linux.sh dist/
          cp controle-horas/scripts/desinstalar-linux.sh dist/

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          name: Controle de Horas ${{ github.ref_name }}

          body: |
            Sistema de Controle de Horas

            Instaladores:
            - Windows EXE
            - Linux Script
            - JAR universal

          files: |
            dist/ControleDeHoras-Installer.exe
            dist/controle-horas.jar
            dist/instalar-linux.sh
            dist/desinstalar-linux.sh