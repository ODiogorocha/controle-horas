name: Build e Release

on:
  push:
    tags:
      - 'v*'

jobs:

  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Permitir Gradle
        run: chmod +x gradlew

      - name: Gerar JAR
        run: ./gradlew clean bootJar

      - name: Renomear JAR
        shell: bash
        run: |
          cp build/libs/*.jar build/libs/controle-horas.jar

      - name: Instalar jpackage
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Criar EXE
        shell: bash
        run: |
          mkdir dist

          jpackage \
            --type exe \
            --name "ControleHoras" \
            --input build/libs \
            --main-jar controle-horas.jar \
            --main-class com.empresa.controle_horas.ControleHorasApplication \
            --dest dist \
            --icon scripts/controle-horas.ico \
            --win-shortcut \
            --win-menu

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            build/libs/controle-horas.jar
            scripts/instalar-linux.sh
            scripts/desinstalar-linux.sh
            scripts/instalar-windows.bat# update
