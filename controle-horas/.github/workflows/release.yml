name: Build e Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:

  # =========================================================
  # BUILD JAR
  # =========================================================

  build-jar:
    name: Gerar JAR
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Permissao Gradle
        working-directory: controle-horas
        run: chmod +x gradlew

      - name: Build projeto
        working-directory: controle-horas
        run: ./gradlew clean bootJar

      - name: Verificar JAR
        run: ls -lh controle-horas/build/libs/

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/controle-horas.jar

  # =========================================================
  # BUILD WINDOWS EXE
  # =========================================================

  build-exe:
    name: Gerar EXE Windows
    runs-on: windows-latest
    needs: build-jar

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Baixar JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/

      - name: Verificar arquivos
        shell: powershell
        run: |
          Get-ChildItem -Recurse controle-horas/build/libs

      - name: Criar pasta installer
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path controle-horas/build/installer

      - name: Gerar instalador EXE
        shell: powershell
        run: |
          jpackage `
            --type exe `
            --input controle-horas/build/libs `
            --main-jar controle-horas.jar `
            --main-class com.empresa.controle_horas.ControleHorasApplication `
            --name "Controle de Horas" `
            --app-version "1.5.4" `
            --vendor "ODiogorocha" `
            --dest controle-horas/build/installer `
            --icon controle-horas/scripts/controle-horas.ico `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut

      - name: Renomear instalador
        shell: powershell
        run: |
          $arquivo = Get-ChildItem "controle-horas/build/installer/*.exe" | Select-Object -First 1
          Copy-Item $arquivo.FullName "controle-horas/build/installer/ControleDeHoras-Installer.exe"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe-installer
          path: controle-horas/build/installer/ControleDeHoras-Installer.exe

  # =========================================================
  # RELEASE
  # =========================================================

  release:
    name: Publicar Release
    runs-on: ubuntu-latest

    needs:
      - build-jar
      - build-exe

    permissions:
      contents: write

    if: startsWith(github.ref, 'refs/tags/')

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: dist/

      - name: Baixar EXE
        uses: actions/download-artifact@v4
        with:
          name: exe-installer
          path: dist/

      - name: Copiar scripts Linux
        run: |
          cp controle-horas/scripts/instalar-linux.sh dist/
          cp controle-horas/scripts/desinstalar-linux.sh dist/
          chmod +x dist/instalar-linux.sh
          chmod +x dist/desinstalar-linux.sh

      - name: Verificar arquivos finais
        run: |
          ls -lh dist/

      - name: Criar Release GitHub
        uses: softprops/action-gh-release@v1
        with:
          name: "Controle de Horas ${{ github.ref_name }}"
          body: |

            ## Sistema de Controle de Horas

            Instaladores oficiais da versao ${{ github.ref_name }}

            ---

            ## Windows 10 / 11

            1. Baixe:
               `ControleDeHoras-Installer.exe`

            2. Execute o instalador

            3. Caso o Windows Defender mostre aviso:
               - Clique em "Mais informacoes"
               - Clique em "Executar assim mesmo"

            ---

            ## Linux

            Execute:

            ```bash
            curl -sSL https://github.com/ODiogorocha/controle-horas/releases/latest/download/instalar-linux.sh | bash
            ```

          files: |
            dist/ControleDeHoras-Installer.exe
            dist/controle-horas.jar
            dist/instalar-linux.sh
            dist/desinstalar-linux.sh