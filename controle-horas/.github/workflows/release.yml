name: Build e Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:

  build-jar:
    name: Gerar JAR
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Permissao Gradle
        working-directory: controle-horas
        run: chmod +x gradlew

      - name: Build JAR
        working-directory: controle-horas
        run: ./gradlew clean bootJar

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/controle-horas.jar

  build-exe:
    name: Gerar EXE Windows
    runs-on: windows-latest
    needs: build-jar

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/

      - name: Criar pasta installer
        shell: cmd
        run: mkdir controle-horas\build\installer

      - name: Verificar arquivos
        shell: cmd
        run: dir controle-horas\build\libs

      - name: Gerar EXE
        shell: cmd
        run: |
          jpackage ^
            --type exe ^
            --input controle-horas\build\libs ^
            --dest controle-horas\build\installer ^
            --name "ControleDeHoras" ^
            --main-jar controle-horas.jar ^
            --main-class com.empresa.controle_horas.ControleHorasApplication ^
            --app-version 1.5.0 ^
            --vendor "ODiogorocha" ^
            --win-menu ^
            --win-shortcut ^
            --win-dir-chooser

      - name: Renomear instalador
        shell: powershell
        run: |
          $arquivo = Get-ChildItem "controle-horas\build\installer\*.exe" | Select-Object -First 1
          Copy-Item $arquivo.FullName "controle-horas\build\installer\ControleDeHoras-Installer.exe"

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe-installer
          path: controle-horas/build/installer/ControleDeHoras-Installer.exe

  release:
    name: Publicar Release
    runs-on: ubuntu-latest

    needs:
      - build-jar
      - build-exe

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: dist/

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: exe-installer
          path: dist/

      - name: Copiar scripts Linux
        run: |
          cp controle-horas/scripts/instalar-linux.sh dist/
          cp controle-horas/scripts/desinstalar-linux.sh dist/

      - name: Verificar arquivos finais
        run: ls -lah dist/

      - name: Criar Release GitHub
        uses: softprops/action-gh-release@v1
        with:
          name: Controle de Horas ${{ github.ref_name }}

          body: |
            ## Controle de Horas

            Sistema desktop para controle de ponto, banco de horas e escalas automáticas.

            ### Windows
            Baixe:
            - ControleDeHoras-Installer.exe

            ### Linux
            Execute:

            ```bash
            curl -fsSL https://github.com/ODiogorocha/controle-de-horas/releases/latest/download/instalar-linux.sh | bash
            ```

          files: |
            dist/controle-horas.jar
            dist/ControleDeHoras-Installer.exe
            dist/instalar-linux.sh
            dist/desinstalar-linux.sh